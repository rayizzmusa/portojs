<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="bg-white min-h-screen" style="font-family:'Plus Jakarta Sans',sans-serif;">

  <!-- HEADER -->
  <header class="bg-blue-700 fixed top-0 left-0 right-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">

      <!-- Logo -->
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center">
          <svg viewBox="0 0 24 24" class="w-5 h-5 text-blue-700" fill="currentColor">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </div>
        <span class="text-white font-bold text-lg tracking-tight">RehanSipaOTWKawin.IDR</span>
      </div>

      <div class="relative" id="accountWrapper">
        <button id="accountToggle" class="flex items-center gap-3 bg-blue-600 hover:bg-blue-500 transition-colors px-3 py-2 rounded-xl">
          <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center flex-shrink-0">
            <span class="text-blue-700 font-bold text-xs">RM</span>
          </div>
          <div class="hidden sm:block text-left">
            <p class="text-white text-sm font-semibold leading-none" id="user-name"></p>
            <p class="text-blue-200 text-xs mt-0.5">Administrator</p>
          </div>
          <svg id="chevron" class="w-4 h-4 text-blue-200 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>

        <!-- Dropdown Menu -->
        <div id="dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 py-1 z-50">
          <a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-700">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            Profil Saya
          </a>
          <a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-700">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 4.93 19.07M4.93 4.93A10 10 0 0 0 19.07 19.07"/>
            </svg>
            Pengaturan
          </a>
          <hr class="my-1 border-gray-100"/>
          <a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm text-red-500 hover:bg-red-50">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Keluar
          </a>
        </div>
      </div>

    </div>
  </header>

  <!-- MAIN -->
  <main class="pt-16 min-h-screen bg-blue-700 flex items-center justify-center px-6 relative overflow-hidden">

    <!-- Transparent SVG Background -->
    <div class="absolute inset-0">
      <svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" class="w-full h-full" preserveAspectRatio="xMidYMid slice">
        <!-- Grid pattern -->
        <defs>
          <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
            <circle cx="20" cy="20" r="1" fill="white" opacity="0.15"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#dots)"/>

        <!-- Decorative circles -->
        <circle cx="100" cy="120" r="180" fill="white" opacity="0.04"/>
        <circle cx="1100" cy="580" r="220" fill="white" opacity="0.04"/>
        <circle cx="1050" cy="100" r="120" fill="white" opacity="0.05"/>
        <circle cx="200" cy="600" r="150" fill="white" opacity="0.03"/>

        <!-- Wave lines -->
        <path d="M0 400 Q 300 300 600 400 T 1200 400" stroke="white" stroke-width="1" fill="none" opacity="0.1"/>
        <path d="M0 450 Q 300 350 600 450 T 1200 450" stroke="white" stroke-width="1" fill="none" opacity="0.07"/>
        <path d="M0 500 Q 300 400 600 500 T 1200 500" stroke="white" stroke-width="0.5" fill="none" opacity="0.05"/>
      </svg>
    </div>

    <!-- Welcome Card -->
    <div class="relative z-10 bg-white bg-opacity-10 border border-white border-opacity-20 rounded-2xl p-10 max-w-lg w-full text-center shadow-2xl">

      <!-- Icon -->
      <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-md">
        <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M3 12l9-9 9 9"/><path d="M9 21V12h6v9"/>
        </svg>
      </div>

      <!-- Text -->
      <p class="text-blue-200 text-xs font-semibold tracking-widest uppercase mb-3">Dashboard Aktif</p>
      <h1 class="text-white text-4xl font-bold leading-tight mb-3">
        Selamat Datang,<br/>
        <span class="text-blue-200" id="user-name2"></span>
      </h1>
      <p class="text-blue-100 text-sm leading-relaxed mb-8">
        Mulai menabung saat ini, supaya bisa segera menikah dengan kekasihmu.
      </p>

      <!-- Buttons -->
      <div class="flex gap-3 justify-center flex-wrap mb-8">
        <button class="bg-white text-blue-700 font-semibold text-sm px-6 py-2.5 rounded-xl hover:bg-blue-50 transition-colors shadow">
          Tambah Tabungan
        </button>
        <button class="border border-white border-opacity-40 text-white font-medium text-sm px-6 py-2.5 rounded-xl hover:bg-white hover:bg-opacity-10 transition-colors">
          Lihat Laporan
        </button>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-3 gap-4 pt-6 border-t border-white border-opacity-15">
        <div>
          <p class="text-white text-2xl font-bold">--</p>
          <p class="text-blue-200 text-xs mt-1 uppercase tracking-wide">Tabungan Terkumpul</p>
        </div>
        <div class="border-l border-r border-white border-opacity-15">
          <p class="text-white text-2xl font-bold">--</p>
          <p class="text-blue-200 text-xs mt-1 uppercase tracking-wide">Rayhan</p>
        </div>
        <div>
          <p class="text-white text-2xl font-bold">--</p>
          <p class="text-blue-200 text-xs mt-1 uppercase tracking-wide">Syifa</p>
        </div>
      </div>

    </div>
  </main>

  <script src="/js/profile.js"></script>
  <script>
    const toggle = document.getElementById('accountToggle');
    const dropdown = document.getElementById('dropdown');
    const chevron = document.getElementById('chevron');

    toggle.addEventListener('click', () => {
      const isHidden = dropdown.classList.toggle('hidden');
      chevron.style.transform = isHidden ? '' : 'rotate(180deg)';
    });

    document.addEventListener('click', (e) => {
      if (!document.getElementById('accountWrapper').contains(e.target)) {
        dropdown.classList.add('hidden');
        chevron.style.transform = '';
      }
    });
  </script>

</body>
</html>
